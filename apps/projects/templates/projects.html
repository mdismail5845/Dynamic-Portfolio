{% load static %}
{% block content %}

<section id="portfolio" class="portfolio">
  <div class="container">

    <!-- Section Title -->
    <div class="row text-center mt-5">
      <h1 class="display-3 fw-bold text-capitalize">{{ project_section.title }}</h1>
      <div class="heading-line"></div>
      <p class="lead">{{ project_section.subtitle }}</p>
    </div>

    <!-- Filter Buttons -->
    <div class="row mt-5 mb-4 g-3 text-center">
      <div class="col-md-12">
        <button class="btn btn-outline-primary filter-btn active" data-category="all" type="button">All</button>
        {% for cat in categories %}
        <button class="btn btn-outline-primary filter-btn" data-category="{{ cat.id }}" type="button">
          {{ cat.name }}
        </button>
        {% endfor %}
      </div>
    </div>

    <!-- Portfolio Items -->
    <div class="row" id="project-container">
      {% for p in projects %}
      <div class="col-lg-4 col-md-6 project-item" data-category="{{ p.category.id|default:'none' }}">
        <div class="portfolio-box shadow">
          <img src="{{ p.image.url }}" alt="{{ p.name }}" class="img-fluid">
          <div class="portfolio-info">
            <div class="caption">
              <h4>{{ p.name }}</h4>
              <p>{{ p.category.name }}</p>
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>

  </div>
</section>
{% endblock content %}
